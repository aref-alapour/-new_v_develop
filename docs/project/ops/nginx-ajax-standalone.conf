# Nginx/LiteSpeed: route POST /ajax to standalone gateway (no WordPress bootstrap).
# Adjust fastcgi_pass / root to match your vhost.

location = /ajax {
    if ($request_method != POST) {
        return 405;
    }
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root/wp-content/mu-plugins/ez_core/ez-ajax-standalone.php;
    fastcgi_pass unix:/run/php/php-fpm.sock;
}

# Set in PHP env (or repo .env):
# EZ_AJAX_STANDALONE_ENABLED=true
