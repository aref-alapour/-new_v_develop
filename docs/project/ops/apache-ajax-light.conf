# Apache: route only booking.sans_day_json to light gateway (ez-ajax.php).
# Merge into site .htaccess BEFORE WordPress catch-all rules.
#
# Requires mod_rewrite and mod_headers (for X-EZ-Action).

<IfModule mod_rewrite.c>
RewriteEngine On
RewriteCond %{REQUEST_METHOD} POST
RewriteCond %{HTTP:X-EZ-Action} ^booking\.sans_day_json$ [NC]
RewriteRule ^ajax/?$ /ez-ajax.php [L]
</IfModule>
