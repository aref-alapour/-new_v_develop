# Apache: route all POST /ajax to standalone gateway (no WordPress bootstrap).
# Merge into site .htaccess BEFORE WordPress catch-all rules.
#
# Requires mod_rewrite.

<IfModule mod_rewrite.c>
RewriteEngine On
RewriteCond %{REQUEST_METHOD} POST
RewriteRule ^ajax/?$ wp-content/mu-plugins/ez_core/ez-ajax-standalone.php [L]
</IfModule>

# Legacy root ez-ajax.php is deprecated; it forwards to ez-ajax-standalone.php.
